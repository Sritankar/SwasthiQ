services:
  - type: web
    name: flow-swasthiq
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: flow-swasthiq-db
          property: connectionString

databases:
  - name: flow-swasthiq-db
    databaseName: flow_swasthiq
    user: flow_swasthiq_user
